services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-app}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mysql
    volumes:
      - ./backend:/var/www/html
      - ./backend/public/uploads:/var/www/html/public/uploads
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      DATABASE_URL: "mysql://${DB_USER:-app}:${DB_PASSWORD}@mysql:3306/${DB_NAME:-app}?serverVersion=8.0.32&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: "^https://www\\.dartplesis\\.lv$"

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    # Build the SPA once, then exit
    command: sh -lc "npm install && npm run build"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  frontend_dist:
