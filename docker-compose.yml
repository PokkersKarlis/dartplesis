services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      - mysql
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      APP_ENV: dev
      DATABASE_URL: "mysql://app:app@mysql:3306/app?serverVersion=8.0.32&charset=utf8mb4"

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      - "9000:9000"
    environment:
      # Windows/OneDrive bind mounts can miss FS events; polling makes HMR reliable.
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      # Expose the build output dir so `npm run build` writes directly to the host.
      # distDir in quasar.config.js resolves to /backend/public/app inside the container.
      - ./backend/public/app:/backend/public/app
    # IMPORTANT: avoid running npm install on every restart (it causes intermittent empty responses)
    command: sh -lc "npm run dev -- --host 0.0.0.0 --port 9000"

volumes:
  mysql_data:

